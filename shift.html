<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲食事業部 シフト管理</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px}
header{background:#1a1a1a;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
header h1{font-size:17px;font-weight:500}
.sync{font-size:12px;display:flex;align-items:center;gap:5px;opacity:0.8}
.dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0}
.dot.ok{background:#7bc67e}.dot.err{background:#f28b82}.dot.loading{background:#ffb74d}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border-bottom:1px solid #e8e8e4}
.nav-btn{background:none;border:1px solid #ccc;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:14px;color:#333}
.nav-btn:hover{background:#f0f0ec}
.month{font-size:19px;font-weight:600}

/* 店舗カラー */
.store-tako{background:#FFE0B2;color:#E65100}
.store-hana{background:#FCE4EC;color:#880E4F}
.store-ryu{background:#E8F5E9;color:#1B5E20}
.store-momo{background:#FFF9C4;color:#F57F17}
.store-bassing{background:#E3F2FD;color:#0D47A1}
.store-cleaning{background:#F3E5F5;color:#4A148C}
.store-yakitate{background:#FBE9E7;color:#BF360C}
.store-sawara{background:#E0F7FA;color:#006064}

.calendar-wrap{padding:0 0 24px}
.section-title{font-size:13px;font-weight:600;color:#666;padding:10px 14px 5px}
.table-wrap{overflow-x:auto;padding:0 14px 4px;-webkit-overflow-scrolling:touch}
table.shift-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;border:1px solid #e8e8e4;overflow:hidden;min-width:700px}
table.shift-table th{font-size:11px;color:#888;font-weight:500;padding:8px 10px;background:#fafaf8;border-bottom:1px solid #e8e8e4;text-align:left;white-space:nowrap}
table.shift-table th.date-col{width:70px;text-align:center}
table.shift-table td{padding:5px 8px;border-bottom:0.5px solid #f0f0ec;vertical-align:top;font-size:12px}
table.shift-table td.date-cell{text-align:center;width:70px;cursor:pointer}
table.shift-table td.date-cell:hover{background:#f5f5f0}
table.shift-table tr:last-child td{border-bottom:none}
table.shift-table tr.today td{background:#edf5fc}
table.shift-table tr.sun .dname,.shift-table tr.sun .dnum{color:#e05555}
table.shift-table tr.sat .dname,.shift-table tr.sat .dnum{color:#4a90d9}
.dnum{font-size:13px;font-weight:600;display:block}
.dname{font-size:10px;color:#999;display:block}
.holiday-jp-s{font-size:9px;color:#e05555;font-weight:600}

.store-cell{padding:4px 6px;border-left:1px solid #f0f0ec}
.shift-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:11px;margin:2px 2px 2px 0;cursor:pointer;white-space:nowrap}
.shift-pill:hover{opacity:0.8}
.add-pill{display:inline-flex;align-items:center;font-size:10px;padding:2px 6px;border-radius:4px;border:1px dashed #ccc;color:#bbb;cursor:pointer;white-space:nowrap;margin:2px 0}
.add-pill:hover{background:#f5f5f0;color:#555}

/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:20px 20px 32px}
@media(min-width:520px){.overlay{align-items:center;padding:16px}.modal{border-radius:14px;max-height:88vh}}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:#888;margin-bottom:5px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:15px;padding:10px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;-webkit-appearance:none;appearance:none}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#4a90d9;box-shadow:0 0 0 3px rgba(74,144,217,0.12)}
.time-row{display:flex;gap:8px;align-items:center}
.time-row input{flex:1}
.time-sep{font-size:14px;color:#999;flex-shrink:0}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.staff-btn{padding:8px 6px;border-radius:7px;border:1.5px solid #e0e0e0;background:#fafafa;color:#555;font-size:13px;cursor:pointer;text-align:center;transition:all 0.15s}
.staff-btn:hover{border-color:#aaa;background:#f0f0ec}
.staff-btn.selected{border-color:#4a90d9;background:#e8f2fd;color:#1a5fa8;font-weight:500}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;border:none}
.btn-primary{background:#1a1a1a;color:#fff}
.btn-cancel{background:#f0f0ec;color:#555}
.btn-delete{background:#fee2e2;color:#b91c1c;margin-right:auto}
.loading-msg{text-align:center;padding:40px;color:#999;font-size:13px}

/* 店舗凡例 */
.legend{display:flex;gap:6px;padding:8px 14px;background:#fff;border-bottom:1px solid #e8e8e4;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 7px;border-radius:4px}
</style>
</head>
<body>

<header>
  <h1>飲食事業部 シフト管理</h1>
  <div class="sync"><div class="dot loading" id="sync-dot"></div><span id="sync-label">読み込み中...</span></div>
</header>

<div class="nav">
  <button class="nav-btn" onclick="changeMonth(-1)">‹ 前月</button>
  <span class="month" id="month-title"></span>
  <button class="nav-btn" onclick="changeMonth(1)">次月 ›</button>
</div>

<div class="legend">
  <span class="legend-item store-tako">タコハイ</span>
  <span class="legend-item store-hana">ハナ</span>
  <span class="legend-item store-ryu">りゅうちゃん</span>
  <span class="legend-item store-momo">もも焼き</span>
  <span class="legend-item store-bassing">バッシング</span>
  <span class="legend-item store-cleaning">横丁清掃</span>
  <span class="legend-item store-yakitate">焼きたて屋</span>
  <span class="legend-item store-sawara">十三里屋</span>
</div>

<div id="calendar-wrap"><div class="loading-msg">読み込み中...</div></div>

<!-- シフト入力モーダル -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">シフトを追加</h3>
    <div class="form-row"><label>日付</label><input id="f-date" type="date"></div>
    <div class="form-row"><label>店舗</label>
      <select id="f-store" onchange="renderStaffGrid()">
        <option value="タコとハイボール">タコとハイボール</option>
        <option value="韓国酒場ハナ">韓国酒場ハナ</option>
        <option value="りゅうちゃん">りゅうちゃん</option>
        <option value="もも焼きJAPAN">もも焼きJAPAN</option>
        <option value="バッシング">バッシング</option>
        <option value="横丁清掃">横丁清掃</option>
        <option value="焼きたて屋鹿島">焼きたて屋鹿島</option>
        <option value="さわら十三里屋">さわら十三里屋</option>
      </select>
    </div>
    <div class="form-row">
      <label>スタッフ（複数選択可）</label>
      <div class="staff-grid" id="staff-grid"></div>
    </div>
    <div class="form-row"><label>時間</label>
      <div class="time-row">
        <input id="f-start" type="time">
        <span class="time-sep">〜</span>
        <input id="f-end" type="time">
      </div>
    </div>
    <div class="form-row"><label>メモ</label><input id="f-memo" placeholder="備考など"></div>
    <div class="modal-btns">
      <button class="btn btn-delete" id="delete-btn" onclick="deleteShift()" style="display:none">削除</button>
      <button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveShift()">保存</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwV_UNDYqwlGhMeoEQiasU348YX_UEKXys7E0TkZaOMfrcXtTx6-JIisyLVMCW2yj3g/exec';
const DAYS = ['日','月','火','水','木','金','土'];

const STORES = [
  { key:'タコとハイボール', cls:'store-tako', staff:['ハルシャニ','ナディーシャ','松岡実麻'] },
  { key:'韓国酒場ハナ',     cls:'store-hana', staff:['レナ','ナディーシャ'] },
  { key:'りゅうちゃん',     cls:'store-ryu',  staff:['河野竜二','網代愛','新河美和','栗林里江','篠塚柚紀'] },
  { key:'もも焼きJAPAN',    cls:'store-momo', staff:['土屋芳広'] },
  { key:'バッシング',       cls:'store-bassing', staff:['石井義則','中村利人','山崎悠人','本田光江'] },
  { key:'横丁清掃',         cls:'store-cleaning', staff:['橋本桂子','小金澤登美江'] },
  { key:'焼きたて屋鹿島',   cls:'store-yakitate', staff:['及川晶雄','小林メグ','荒宏信'] },
  { key:'さわら十三里屋',   cls:'store-sawara', staff:['八木秀子','籾山結泉','下河邊なお子','小堀真桜'] },
];

const HOLIDAYS_JP = new Set([
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
  '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23',
  '2027-03-21','2027-03-22','2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23',
  '2027-10-11','2027-11-03','2027-11-23',
]);

let current = new Date();
current = new Date(current.getFullYear(), current.getMonth(), 1);
let shifts = {};
let editingId = null, editingDate = null;
let selectedStaff = [];
let cbCount = 0;

function setSync(s, l) {
  document.getElementById('sync-dot').className = 'dot ' + s;
  document.getElementById('sync-label').textContent = l;
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb' + (++cbCount);
    const timeout = setTimeout(() => { delete window[cbName]; reject(new Error('timeout')); }, 25000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
      resolve(data);
    };
    const qs = Object.entries({ ...params, callback: cbName })
      .map(([k,v]) => `${k}=${encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)}`).join('&');
    const script = document.createElement('script');
    script.id = cbName;
    script.src = `${API}?${qs}&t=${Date.now()}`;
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); reject(new Error('error')); };
    document.head.appendChild(script);
  });
}

async function loadAll(showLoading) {
  if (showLoading !== false) setSync('loading', '読み込み中...');
  try {
    const data = await jsonp({ action: 'getShifts' });
    shifts = data || {};
    setSync('ok', '同期済み');
    render();
  } catch(e) {
    setSync('err', '読み込み失敗');
    document.getElementById('calendar-wrap').innerHTML =
      '<div class="loading-msg">読み込みに失敗しました。再読み込みしてください。</div>';
  }
}

function fmt(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function getStoreCls(storeName) {
  const s = STORES.find(s => s.key === storeName);
  return s ? s.cls : 'store-tako';
}

function render() {
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('month-title').textContent = `${y}年${m+1}月`;
  const lastDay = new Date(y, m+1, 0).getDate();
  const now = new Date();
  const todayKey = fmt(now.getFullYear(), now.getMonth(), now.getDate());

  function buildTable(from, to) {
    let rows = '';
    for (let d = from; d <= to; d++) {
      const date = new Date(y, m, d);
      const dow = date.getDay();
      const key = fmt(y, m, d);
      const isToday = key === todayKey;
      const isHolidayJp = HOLIDAYS_JP.has(key);
      const isSun = dow===0, isSat = dow===6;
      const cls = (isSun?'sun':isSat?'sat':'') + (isToday?' today':'');
      const dayShifts = shifts[key] || [];
      const dnumStyle = (isHolidayJp||isSun)?'color:#e05555':(isSat?'color:#4a90d9':'');

      // 店舗ごとにシフトをまとめる
      const storeCells = STORES.map(store => {
        const storeShifts = dayShifts.filter(s => s.store === store.key);
        const pills = storeShifts.map(s => {
          const time = s.start?(s.end?`${s.start}〜${s.end}`:s.start):'';
          const label = [s.staff, time].filter(Boolean).join(' ');
          return `<span class="shift-pill ${store.cls}" onclick="openEdit('${key}','${s.id}')">${label}</span>`;
        }).join('');
        return `<td class="store-cell">
          ${pills}
          <span class="add-pill" onclick="openAdd('${key}','${store.key}')">＋</span>
        </td>`;
      }).join('');

      rows += `<tr class="${cls}">
        <td class="date-cell" onclick="openAdd('${key}','')">
          <span class="dnum" style="${dnumStyle}">${d}</span>
          <span class="dname">${DAYS[dow]}</span>
          ${isHolidayJp?`<span class="holiday-jp-s">祝</span>`:''}
        </td>
        ${storeCells}
      </tr>`;
    }
    return rows;
  }

  const storeHeaders = STORES.map(s =>
    `<th><span class="legend-item ${s.cls}" style="padding:2px 6px;border-radius:4px;font-size:11px">${s.key}</span></th>`
  ).join('');

  function buildSection(from, to, label) {
    return `
      <div class="section-title">${label}</div>
      <div class="table-wrap">
        <table class="shift-table">
          <thead><tr>
            <th class="date-col">日付</th>
            ${storeHeaders}
          </tr></thead>
          <tbody>${buildTable(from, to)}</tbody>
        </table>
      </div>`;
  }

  document.getElementById('calendar-wrap').innerHTML =
    buildSection(1, 15, '上半期 — 1日〜15日') +
    '<div style="height:12px"></div>' +
    buildSection(16, lastDay, `下半期 — 16日〜${lastDay}日`) +
    '<div style="height:24px"></div>';
}

function changeMonth(d) {
  current = new Date(current.getFullYear(), current.getMonth()+d, 1);
  loadAll();
}

function getStaffForStore(storeName) {
  const s = STORES.find(s => s.key === storeName);
  return s ? s.staff : [];
}

function renderStaffGrid() {
  const storeName = document.getElementById('f-store').value;
  const staffList = getStaffForStore(storeName);
  document.getElementById('staff-grid').innerHTML = staffList.map(s => {
    const on = selectedStaff.includes(s);
    return `<div class="staff-btn${on?' selected':''}" onclick="toggleStaff('${s}')">${s}</div>`;
  }).join('');
}

function toggleStaff(name) {
  selectedStaff = selectedStaff.includes(name)
    ? selectedStaff.filter(s => s !== name)
    : [...selectedStaff, name];
  renderStaffGrid();
}

function openAdd(dateKey, storeName) {
  editingId = null; editingDate = dateKey;
  selectedStaff = [];
  document.getElementById('modal-title').textContent = (() => {
    const [,mo,day] = dateKey.split('-');
    return `${parseInt(mo)}月${parseInt(day)}日 — シフトを追加`;
  })();
  document.getElementById('f-date').value = dateKey;
  document.getElementById('f-store').value = storeName || 'タコとハイボール';
  document.getElementById('f-start').value = '';
  document.getElementById('f-end').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('delete-btn').style.display = 'none';
  renderStaffGrid();
  document.getElementById('overlay').classList.add('open');
}

function openEdit(dateKey, id) {
  const ev = (shifts[dateKey]||[]).find(s => s.id===id);
  if (!ev) return;
  editingId = id; editingDate = dateKey;
  selectedStaff = ev.staff ? ev.staff.split('・').filter(Boolean) : [];
  const [,mo,day] = dateKey.split('-');
  document.getElementById('modal-title').textContent = `${parseInt(mo)}月${parseInt(day)}日 — 編集`;
  document.getElementById('f-date').value = ev.date||dateKey;
  document.getElementById('f-store').value = ev.store||'タコとハイボール';
  document.getElementById('f-start').value = ev.start||'';
  document.getElementById('f-end').value = ev.end||'';
  document.getElementById('f-memo').value = ev.memo||'';
  document.getElementById('delete-btn').style.display = '';
  renderStaffGrid();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

async function saveShift() {
  if (selectedStaff.length === 0) { alert('スタッフを選択してください'); return; }
  const newDate = document.getElementById('f-date').value || editingDate;
  const ev = {
    id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    date: newDate,
    store: document.getElementById('f-store').value,
    staff: selectedStaff.join('・'),
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    memo: document.getElementById('f-memo').value.trim()
  };
  closeModal();
  setSync('loading', '保存中...');
  try {
    await jsonp({ action: 'saveShift', data: ev });
    await loadAll(false);
    setSync('ok', '保存済み');
  } catch(e) { setSync('err', '保存失敗'); }
}

async function deleteShift() {
  if (!confirm('このシフトを削除しますか？')) return;
  const delId = editingId;
  closeModal();
  setSync('loading', '削除中...');
  try {
    await jsonp({ action: 'deleteShift', data: { id: delId } });
    await loadAll(false);
    setSync('ok', '削除済み');
  } catch(e) { setSync('err', '削除失敗'); }
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadAll();
</script>
</body>
</html>
