<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:16px}
header{background:#1a1a1a;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
header h1{font-size:18px;font-weight:500;letter-spacing:0.05em}
.sync{font-size:13px;display:flex;align-items:center;gap:5px;opacity:0.8}
.dot{width:7px;height:7px;border-radius:50%;background:#888;flex-shrink:0}
.dot.ok{background:#7bc67e}.dot.err{background:#f28b82}.dot.loading{background:#ffb74d}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border-bottom:1px solid #e8e8e4}
.nav-btn{background:none;border:1px solid #ccc;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:15px;color:#333}
.nav-btn:hover{background:#f0f0ec}
.month{font-size:20px;font-weight:600}
.holiday-counter{background:#fff;border-bottom:1px solid #e8e8e4;padding:8px 14px}
.holiday-counter-title{font-size:13px;color:#aaa;font-weight:500;margin-bottom:4px}
.holiday-counter-period{font-size:11px;color:#bbb;margin-bottom:5px}
.holiday-chips{display:flex;flex-wrap:wrap;gap:5px}
.holiday-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid #e0e0e0;background:#fafafa}
.holiday-chip .chip-name{color:#333;font-weight:500}
.holiday-chip .chip-count{color:#fff;background:#e05555;border-radius:10px;padding:1px 6px;font-size:11px;font-weight:600}
.holiday-chip .chip-count.ok{background:#7bc67e}
.legend{display:flex;gap:8px;padding:8px 14px;background:#fff;border-bottom:1px solid #e8e8e4;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#555}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.section-title{font-size:14px;font-weight:600;color:#666;padding:10px 14px 5px;letter-spacing:0.05em}
.timeline-wrap{overflow-x:auto;padding:0 14px 4px;-webkit-overflow-scrolling:touch}
.timeline-grid{min-width:900px;background:#fff;border-radius:8px;border:1px solid #e8e8e4;overflow:hidden}
.tl-header{display:flex;border-bottom:1px solid #e8e8e4;background:#fafaf8}
.tl-date-col{width:62px;min-width:62px;flex-shrink:0;font-size:11px;color:#aaa;padding:5px 0;border-right:1px solid #e8e8e4;text-align:center}
.tl-hours{flex:1;display:flex}
.tl-hour{flex:1;font-size:10px;color:#bbb;text-align:left;padding:5px 0 5px 3px;border-right:0.5px solid #efefef;min-width:0}
.tl-hour:last-child{border-right:none}

<script>
const API = 'https://script.google.com/macros/s/AKfycbwV_UNDYqwlGhMeoEQiasU348YX_UEKXys7E0TkZaOMfrcXtTx6-JIisyLVMCW2yj3g/exec';
const STAFF_OWN  = ['平野健雄','安藤正樹','伏田幸枝','小林俊樹','石毛貴英','池田久史','三浦達弥','飯田怜飛','飯田栄'];
const STAFF_OUT  = ['SUN-X','SIBS','One by One','増田（伸和洗浄）','ロープワーク','RISE','ミノアカ','小池','サンクトラスト'];
const STAFF_HOLIDAY = ['平野健雄','安藤正樹','伏田幸枝','小林俊樹','石毛貴英'];
const CARS = ['ロング','ショート','バン','ハイゼット','エブリー'];
const DAYS = ['日','月','火','水','木','金','土'];
const MAX_HOLIDAYS = 9;

const HOLIDAYS_JP = new Set([
  '2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24',
  '2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06',
  '2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23',
  '2025-10-13','2025-11-03','2025-11-23','2025-11-24',
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23',
  '2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05','2026-05-06',
  '2026-07-20','2026-08-11','2026-09-21','2026-09-22','2026-09-23',
  '2026-10-12','2026-11-03','2026-11-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23',
  '2027-03-21','2027-03-22','2027-04-29','2027-05-03','2027-05-04','2027-05-05',
  '2027-07-19','2027-08-11','2027-09-20','2027-09-23',
  '2027-10-11','2027-11-03','2027-11-23',
]);

const TYPE_CLASS = {daily:'type-daily',regular:'type-regular',bird:'type-bird',outsource:'type-outsource',pending:'type-pending'};
const HOUR_START = 6, HOUR_END = 24, TOTAL_HOURS = 18;
const HOURS = Array.from({length: TOTAL_HOURS}, (_,i) => HOUR_START + i);

let current = new Date();
current = new Date(current.getFullYear(), current.getMonth(), 1);
let events = {}, holidays = {}, paidLeaves = {};
let editingId = null, editingDate = null, holidayDate = null;
let selectedStaff = [], selectedCars = [];
let cbCount = 0;

// ===== API =====
function setSync(s, l) {
  document.getElementById('sync-dot').className = 'dot ' + s;
  document.getElementById('sync-label').textContent = l;
}

function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb' + (++cbCount);
    const timeout = setTimeout(() => { delete window[cbName]; reject(new Error('timeout')); }, 25000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
      resolve(data);
    };
    const qs = Object.entries({ ...params, callback: cbName })
      .map(([k,v]) => `${k}=${encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)}`).join('&');
    const script = document.createElement('script');
    script.id = cbName;
    script.src = `${API}?${qs}&t=${Date.now()}`;
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; script.remove(); reject(new Error('error')); };
    document.head.appendChild(script);
  });
}

async function loadAll(showLoading) {
  if (showLoading !== false) setSync('loading', '読み込み中...');
  try {
    const [evData, holData, plData] = await Promise.all([
      jsonp({ action: 'getAll' }),
      jsonp({ action: 'getHolidays' }),
      jsonp({ action: 'getPaidLeaves' })
    ]);
    events = evData || {};
    holidays = holData || {};
    paidLeaves = plData || {};
    setSync('ok', '同期済み');
    render();
  } catch(e) {
    setSync('err', '読み込み失敗');
    if (!Object.keys(events).length) {
      // 固定カウンターを更新
  const p1start = fmt(m===0?y-1:y, m===0?11:m-1, 16);
  const p1end = fmt(y, m, 15);
  const p2start = fmt(y, m, 16);
  const p2nextM = m===11?0:m+1, p2nextY = m===11?y+1:y;
  const p2end = fmt(p2nextY, p2nextM, 15);


  document.getElementById('calendar-wrap').innerHTML =
        '<div class="err-msg">データの読み込みに失敗しました。<br>ページを再読み込みしてください。</div>';
    }
  }
}

// ===== ユーティリティ =====
function fmt(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function timeToHour(t) {
  if (!t) return null;
  const [h, mi] = t.split(':').map(Number);
  return h + mi / 60;
}

function hourToPct(h) {
  return ((Math.max(HOUR_START, Math.min(HOUR_END, h)) - HOUR_START) / TOTAL_HOURS) * 100;
}

// ===== 休日カウンター =====
function strToDate(dateStr) {
  if (!dateStr) return null;
  const p = dateStr.split('-');
  return p.length < 3 ? null : new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function countHolidaysInPeriod(start, end) {
  const counts = {};
  STAFF_HOLIDAY.forEach(s => counts[s] = 0);
  Object.entries(holidays).forEach(([date, staffList]) => {
    if (date >= start && date <= end) {
      staffList.forEach(s => { if (counts[s] !== undefined) counts[s]++; });
    }
  });
  return counts;
}

function makeChipsHtml(start, end) {
  const counts = countHolidaysInPeriod(start, end);
  return STAFF_HOLIDAY.map(s => {
    const remain = MAX_HOLIDAYS - (counts[s] || 0);
    return `<div class="holiday-chip"><span class="chip-name">${s}</span><span class="chip-count${remain<=0?' ok':''}"">残${remain}日</span></div>`;
  }).join('');
}

function makeCounterHtml(y, m, isFirst) {
  let start, end, label;
  if (isFirst) {
    const prevM = m === 0 ? 11 : m - 1;
    const prevY = m === 0 ? y - 1 : y;
    start = fmt(prevY, prevM, 16);
    end = fmt(y, m, 15);
    label = `${prevY}年${prevM+1}月16日 〜 ${y}年${m+1}月15日`;
  } else {
    const nextM = m === 11 ? 0 : m + 1;
    const nextY = m === 11 ? y + 1 : y;
    start = fmt(y, m, 16);
    end = fmt(nextY, nextM, 15);
    label = `${y}年${m+1}月16日 〜 ${nextY}年${nextM+1}月15日`;
  }
  return `<div class="holiday-counter">
    <div class="holiday-counter-title">残り休日数（〆期間）</div>
    <div class="holiday-counter-period">${label}</div>
    <div class="holiday-chips">${makeChipsHtml(start, end)}</div>
  </div>`;
}

// ===== カレンダー描画 =====
function buildHalf(from, to, y, m, todayKey) {
  let rows = '';
  for (let d = from; d <= to; d++) {
    const date = new Date(y, m, d);
    const dow = date.getDay();
    const key = fmt(y, m, d);
    const isToday = key === todayKey;
    const isHolidayJp = HOLIDAYS_JP.has(key);
    const isSun = dow === 0, isSat = dow === 6;
    const cls = (isSun?'sun':isSat?'sat':'') + (isToday?' today':'');
    const dayEvs = events[key] || [];
    const dayHols = holidays[key] || [];

    // バー（外注・未定以外のタイムライン表示）
    let bars = '';
    let occupied = [];
    dayEvs.filter(ev => ev.type !== 'outsource').forEach(ev => {
      const tc = TYPE_CLASS[ev.type] || 'type-daily';
      const sh = timeToHour(ev.start);
      const eh = timeToHour(ev.end);
      const who = Array.isArray(ev.staff) ? ev.staff.filter(Boolean).join('・') : '';
      const carStr = Array.isArray(ev.cars) && ev.cars.length ? `[${ev.cars.join('・')}]` : '';
      const depStr = ev.departure ? `<span style="color:#FF4444;font-weight:600">${ev.departure}出社</span>` : '';
      const label = [depStr, ev.place, who, carStr].filter(Boolean).join(' ');

      let leftPct, widthPct;
      if (sh !== null && eh !== null && eh > sh) {
        leftPct = hourToPct(sh); widthPct = hourToPct(eh) - leftPct;
      } else if (sh !== null) {
        leftPct = hourToPct(sh); widthPct = 100 / TOTAL_HOURS;
      } else {
        leftPct = 0; widthPct = 20;
      }
      let topPx = 5;
      for (const o of occupied) {
        if (leftPct < o.right && leftPct + widthPct > o.left) topPx = o.top + 26;
      }
      occupied.push({ left: leftPct, right: leftPct + widthPct, top: topPx });
      bars += `<span class="ev-bar ${tc}" style="left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;top:${topPx}px" onclick="openEdit('${key}','${ev.id}')">${label}</span>`;
    });

    const maxTop = occupied.length ? Math.max(...occupied.map(o=>o.top)) : 5;
    const barHeight = Math.max(32, maxTop + 28);

    // 外注列
    const outsourceItems = dayEvs.filter(ev => ev.type === 'outsource').map(ev => {
      const who = Array.isArray(ev.staff) ? ev.staff.filter(Boolean).join('・') : '';
      const label = [who, ev.place].filter(Boolean).join('/');
      return `<span class="outsource-item" onclick="openEdit('${key}','${ev.id}')">${label}</span>`;
    }).join('');

    // 休み・手空きタグ
    const assignedStaff = new Set();
    dayEvs.forEach(ev => { if (Array.isArray(ev.staff)) ev.staff.filter(Boolean).forEach(s => assignedStaff.add(s)); });
    const dayPaids = paidLeaves[key] || [];
    const holidayTags = dayHols.map(s => `<span class="holiday-tag" onclick="openHolidayModal('${key}')">${s}</span>`).join('');
    const paidTags = dayPaids.map(s => `<span class="paid-tag" onclick="openHolidayModal('${key}')">${s}(有)</span>`).join('');
    const freeTags = STAFF_HOLIDAY.filter(s => !dayHols.includes(s) && !dayPaids.includes(s) && !assignedStaff.has(s)).map(s => `<span class="free-tag">${s}</span>`).join('');

    // 祝日表示
    const holidayJpLabel = isHolidayJp ? `<span class="holiday-jp-label">祝</span>` : '';
    const dnumColor = (isHolidayJp || isSun) ? 'color:#e05555' : (isSat ? 'color:#4a90d9' : '');

    rows += `<div class="tl-row ${cls}">
      <div class="tl-date" onclick="openAdd('${key}')">
        <span class="dnum" style="${dnumColor}">${d}</span>
        <span class="dname">${DAYS[dow]}</span>
        ${holidayJpLabel}
      </div>
      <div class="tl-right">
        <div class="tl-bar-area" style="min-height:${barHeight}px">
          ${bars}
          <button class="add-btn" onclick="openAdd('${key}')">＋ 現場</button>
        </div>
        <div class="tl-holiday-row">
          ${holidayTags}${paidTags}${freeTags}
          <span class="holiday-tag" style="background:#f5f5f0;color:#bbb;border:1px dashed #ddd" onclick="openHolidayModal('${key}')">＋ 休み</span>
        </div>
      </div>
      <div class="tl-outsource-col">${outsourceItems}</div>
    </div>`;
  }
  return rows;
}

function buildMobileHalf(from, to, y, m, todayKey) {
  let rows = '';
  for (let d = from; d <= to; d++) {
    const date = new Date(y, m, d);
    const dow = date.getDay();
    const key = fmt(y, m, d);
    const isToday = key === todayKey;
    const isHolidayJp = HOLIDAYS_JP.has(key);
    const isSun = dow === 0, isSat = dow === 6;
    const dayEvs = events[key] || [];
    const dayHols = holidays[key] || [];

    const dnumColor = (isHolidayJp||isSun)?'color:#e05555':(isSat?'color:#4a90d9':'');
    const bgColor = isToday?'background:#edf5fc':'';
    const holidayJpLabel = isHolidayJp ? `<span class="mobile-holiday-jp">祝</span>` : '';

    // 現場イベント（外注以外）
    const assignedStaff = new Set();
    const evItems = dayEvs.filter(ev=>ev.type!=='outsource').map(ev => {
      const tc = TYPE_CLASS[ev.type]||'type-daily';
      if (Array.isArray(ev.staff)) ev.staff.filter(Boolean).forEach(s=>assignedStaff.add(s));
      const who = Array.isArray(ev.staff)?ev.staff.filter(Boolean).join('・'):'';
      const dep = ev.departure?`${ev.departure}出社 `:'';
      const time = ev.start?(ev.end?`${ev.start}〜${ev.end}`:ev.start):'';
      const cars = Array.isArray(ev.cars)&&ev.cars.length?`[${ev.cars.join('・')}]`:'';
      return `<div class="mobile-ev ${tc}" onclick="openEdit('${key}','${ev.id}')">
        <span class="mobile-ev-time">${dep}${time}</span>
        <div><div class="mobile-ev-name">${ev.place}</div><div class="mobile-ev-staff">${[who,cars].filter(Boolean).join(' ')}</div></div>
      </div>`;
    }).join('');

    // 外注
    const outsourceItems = dayEvs.filter(ev=>ev.type==='outsource').map(ev=>{
      const who = Array.isArray(ev.staff)?ev.staff.filter(Boolean).join('・'):'';
      return `<span class="mobile-outsource-item" onclick="openEdit('${key}','${ev.id}')">${[who,ev.place].filter(Boolean).join('/')}</span>`;
    }).join('');

    // 休み・手空き
    const dayPaidsMobile = paidLeaves[key] || [];
    const holidayTags = dayHols.map(s=>`<span class="holiday-tag" onclick="openHolidayModal('${key}')">${s}</span>`).join('');
    const paidTagsMobile = dayPaidsMobile.map(s=>`<span class="paid-tag" onclick="openHolidayModal('${key}')">${s}(有)</span>`).join('');
    const freeTags = STAFF_HOLIDAY.filter(s=>!dayHols.includes(s)&&!dayPaidsMobile.includes(s)&&!assignedStaff.has(s)).map(s=>`<span class="free-tag">${s}</span>`).join('');

    rows += `<div class="mobile-row" style="${bgColor}">
      <div class="mobile-date">
        <span class="mobile-dnum" style="${dnumColor}">${d}</span>
        <span class="mobile-dname">${DAYS[dow]}</span>
        ${holidayJpLabel}
        <button class="mobile-add-btn" onclick="openAdd('${key}')">＋ 現場</button>
      </div>
      <div class="mobile-events">${evItems}</div>
      ${outsourceItems?`<div class="mobile-outsource">${outsourceItems}</div>`:''}
      <div class="mobile-holiday-row">${holidayTags}${paidTagsMobile}${freeTags}<span class="holiday-tag" style="background:#f5f5f0;color:#bbb;border:1px dashed #ddd" onclick="openHolidayModal('${key}')">＋ 休み</span></div>
    </div>`;
  }
  return rows;
}

function render() {
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('month-title').textContent = `${y}年${m+1}月`;
  const lastDay = new Date(y, m+1, 0).getDate();
  const now = new Date();
  const todayKey = fmt(now.getFullYear(), now.getMonth(), now.getDate());
  const hourHeaders = HOURS.map(h => `<div class="tl-hour">${h}:00</div>`).join('');

  function buildSection(from, to, label, isFirst) {
    const sectionId = isFirst ? 'section-first' : 'section-second';
    const chipsId = isFirst ? 'chips-first' : 'chips-second';
    const counterHtml = makeCounterHtml(y, m, isFirst).replace(
      'class="holiday-chips"',
      `class="holiday-chips" id="${chipsId}"`
    );
    return `
      <div id="${sectionId}">
      ${counterHtml}
      <div class="section-title">${label}</div>
      <div class="timeline-wrap">
        <div class="timeline-grid">
          <div class="tl-header">
            <div class="tl-date-col">日付</div>
            <div class="tl-hours">${hourHeaders}</div>
            <div class="tl-outsource-header">外注</div>
          </div>
          ${buildHalf(from, to, y, m, todayKey)}
        </div>
      </div>
      <div class="mobile-list">
        ${buildMobileHalf(from, to, y, m, todayKey)}
      </div>`;
  }

  // 固定カウンターを更新
  const p1start = fmt(m===0?y-1:y, m===0?11:m-1, 16);
  const p1end = fmt(y, m, 15);
  const p2start = fmt(y, m, 16);
  const p2nextM = m===11?0:m+1, p2nextY = m===11?y+1:y;
  const p2end = fmt(p2nextY, p2nextM, 15);


  document.getElementById('calendar-wrap').innerHTML =
    buildSection(1, 15, '上半期 — 1日〜15日', true) + '</div>' +
    '<div style="height:12px"></div>' +
    buildSection(16, lastDay, `下半期 — 16日〜${lastDay}日`, false) + '</div>' +
    '<div style="height:24px"></div>';
}

function changeMonth(d) {
  current = new Date(current.getFullYear(), current.getMonth()+d, 1);
  loadAll();
}

// ===== スタッフ・車両グリッド =====
function renderStaffGrid() {
  function makeBtn(s) {
    const on = selectedStaff.includes(s);
    return `<div class="toggle-btn${on?' selected':''}" onclick="toggleStaff('${s.replace(/'/g,"\\'")}')\">${s}</div>`;
  }
  document.getElementById('staff-grid').innerHTML =
    `<div class="staff-section-label">自社スタッフ</div>` + STAFF_OWN.map(makeBtn).join('') +
    `<div class="staff-section-label">外注</div>` + STAFF_OUT.map(makeBtn).join('');
}

function toggleStaff(name) {
  selectedStaff = selectedStaff.includes(name) ? selectedStaff.filter(s=>s!==name) : [...selectedStaff, name];
  renderStaffGrid();
}

function renderCarGrid() {
  document.getElementById('car-grid').innerHTML = CARS.map(c => {
    const on = selectedCars.includes(c);
    return `<div class="toggle-btn${on?' selected':''}" onclick="toggleCar('${c}')">${c}</div>`;
  }).join('');
}

function toggleCar(name) {
  selectedCars = selectedCars.includes(name) ? selectedCars.filter(s=>s!==name) : [...selectedCars, name];
  renderCarGrid();
}

// ===== モーダル =====
function openAdd(dateKey) {
  editingId = null; editingDate = dateKey;
  selectedStaff = []; selectedCars = [];
  const [,mo,day] = dateKey.split('-');
  document.getElementById('modal-title').textContent = `${parseInt(mo)}月${parseInt(day)}日 — 現場を追加`;
  document.getElementById('f-date').value = editingDate;
  document.getElementById('f-place').value = '';
  document.getElementById('f-client').value = '';
  document.getElementById('f-type').value = 'daily';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('f-departure').value = '';
  document.getElementById('f-start').value = '';
  document.getElementById('f-end').value = '';
  document.getElementById('delete-btn').style.display = 'none';
  renderStaffGrid();
  renderCarGrid();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-place').focus(), 150);
}

function openEdit(dateKey, id) {
  const ev = (events[dateKey]||[]).find(e => e.id===id);
  if (!ev) return;
  editingId = id; editingDate = dateKey;
  selectedStaff = Array.isArray(ev.staff) ? ev.staff.filter(Boolean) : [];
  selectedCars = Array.isArray(ev.cars) ? ev.cars.filter(Boolean) : [];
  const [,mo,day] = dateKey.split('-');
  document.getElementById('modal-title').textContent = `${parseInt(mo)}月${parseInt(day)}日 — 編集`;
  document.getElementById('f-date').value = ev.date||'';
  document.getElementById('f-place').value = ev.place||'';
  document.getElementById('f-client').value = ev.client||'';
  document.getElementById('f-type').value = ev.type||'daily';
  document.getElementById('f-amount').value = ev.amount||'';
  document.getElementById('f-memo').value = ev.memo||'';
  document.getElementById('f-departure').value = ev.departure||'';
  document.getElementById('f-start').value = ev.start||'';
  document.getElementById('f-end').value = ev.end||'';
  document.getElementById('delete-btn').style.display = '';
  renderStaffGrid();
  renderCarGrid();
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

// ===== 休日モーダル =====
function openHolidayModal(dateKey) {
  holidayDate = dateKey;
  const [,mo,day] = dateKey.split('-');
  document.getElementById('holiday-modal-title').textContent = `${parseInt(mo)}月${parseInt(day)}日 — 休日登録`;
  renderHolidayGrid();
  document.getElementById('holiday-overlay').classList.add('open');
}

function renderHolidayGrid() {
  const dayHols = holidays[holidayDate] || [];
  const dayPaids = paidLeaves[holidayDate] || [];
  document.getElementById('holiday-staff-grid').innerHTML = STAFF_HOLIDAY.map(s => {
    const on = dayHols.includes(s);
    return `<div class="holiday-staff-btn${on?' selected':''}" onclick="toggleHoliday('${s}')">${s}</div>`;
  }).join('');
  document.getElementById('paid-leave-grid').innerHTML = STAFF_HOLIDAY.map(s => {
    const on = dayPaids.includes(s);
    return `<div class="holiday-staff-btn${on?' selected':''}" style="${on?'border-color:#1a6e31;background:#d4edda;color:#1a6e31':''}" onclick="togglePaidLeave('${s}')">${s}</div>`;
  }).join('');
}

async function togglePaidLeave(name) {
  const dayPaids = paidLeaves[holidayDate] || [];
  const isOn = dayPaids.includes(name);
  if (isOn) {
    paidLeaves[holidayDate] = dayPaids.filter(s => s !== name);
    if (!paidLeaves[holidayDate].length) delete paidLeaves[holidayDate];
  } else {
    if (!paidLeaves[holidayDate]) paidLeaves[holidayDate] = [];
    paidLeaves[holidayDate].push(name);
  }
  renderHolidayGrid();
  render();
  setSync('loading', '保存中...');
  try {
    await jsonp({ action: isOn?'deletePaidLeave':'savePaidLeave', data: { date: holidayDate, staff: name } });
    setSync('ok', '保存済み');
  } catch(e) { setSync('err', '保存失敗'); }
}

async function toggleHoliday(name) {
  const dayHols = holidays[holidayDate] || [];
  const isOn = dayHols.includes(name);
  if (isOn) {
    holidays[holidayDate] = dayHols.filter(s => s !== name);
    if (!holidays[holidayDate].length) delete holidays[holidayDate];
  } else {
    if (!holidays[holidayDate]) holidays[holidayDate] = [];
    holidays[holidayDate].push(name);
  }
  renderHolidayGrid();
  render();
  setSync('loading', '保存中...');
  try {
    await jsonp({ action: isOn?'deleteHoliday':'saveHoliday', data: { date: holidayDate, staff: name } });
    setSync('ok', '保存済み');
  } catch(e) { setSync('err', '保存失敗'); }
}

function closeHolidayModal() { document.getElementById('holiday-overlay').classList.remove('open'); }

// ===== 保存・削除 =====
async function saveEvent() {
  const place = document.getElementById('f-place').value.trim();
  if (!place) { alert('現場名を入力してください'); return; }
  const newDate = document.getElementById('f-date').value || editingDate;
  const ev = {
    id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    date: newDate, place,
    client: document.getElementById('f-client').value.trim(),
    type: document.getElementById('f-type').value,
    outsource: '',
    staff: selectedStaff,
    cars: selectedCars,
    departure: document.getElementById('f-departure').value,
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    amount: document.getElementById('f-amount').value.trim(),
    memo: document.getElementById('f-memo').value.trim()
  };
  closeModal();
  setSync('loading', '保存中...');
  try {
    await jsonp({ action: 'save', data: ev });
    await loadAll(false);
    setSync('ok', '保存済み');
  } catch(e) { setSync('err', '保存失敗'); }
}

async function deleteEvent() {
  if (!confirm('この予定を削除しますか？')) return;
  const delId = editingId;
  closeModal();
  setSync('loading', '削除中...');
  try {
    await jsonp({ action: 'delete', data: { id: delId } });
    await loadAll(false);
    setSync('ok', '削除済み');
  } catch(e) { setSync('err', '削除失敗'); }
}

document.getElementById('overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.getElementById('holiday-overlay').addEventListener('click', function(e) { if(e.target===this) closeHolidayModal(); });

loadAll();
</script>
</body>
</html>
